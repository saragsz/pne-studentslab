<!DOCTYPE html>
<html>
<head>
    <title>Genome Browser</title>
</head>

<body style="background-color:#ffe4ec; font-family:'Times New Roman', Times, serif;">

    <h1 style="font-size:40px;">
        Browsing Human and Vertebrates genome
    </h1>

    <h2 style="font-size:28px;">
        BASIC Level Services
    </h2>

    <p><b>1)List of species in the genome database</b></p>
    <form action="/listSpecies" method="get">
        Limit :
        <input type="text" name="limit" style="width:200px;">
        <br><br>
        <input type="submit" value="Send">
    </form>

    <p><b>2)Information about the karyotype :</b></p>
    <form action="/karyotype" method="get">
        Select the species :
        <input type="text" name="species" style="width:200px;">
        <br><br>
        <input type="submit" value="Send">
    </form>

    <p><b>3)Chromosome Length</b></p>
    <form action="/chromosomeLength" method="get">
        Select the species :
        <input type="text" name="species" style="width:200px;">
        <br><br>
        Select a chromosome :
        <input type="text" name="chromo" style="width:200px; border:2px solid #cc6666;">
        <br><br>
        <input type="submit" value="Send">
    </form>

</body>
</html>
